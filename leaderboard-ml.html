<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard MLBB - CCE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}

body{
  background: radial-gradient(circle at top,#0f0f1a,#050509);
  color:white;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:rgba(0,0,0,0.6);
  border-bottom:1px solid rgba(0,255,255,0.2);
}

nav h1{color:cyan;font-size:1.2rem;}

.menu-nav{display:flex;gap:10px;}

nav a{
  color:white;
  text-decoration:none;
  font-size:0.8rem;
  padding:5px 8px;
  border-radius:5px;
  transition:0.3s;
}

nav a:hover{
  background:cyan;
  color:black;
}

/* TITLE */
.title{
  text-align:center;
  margin:25px 0;
  color:cyan;
  text-shadow:0 0 20px cyan;
  font-size:1.8rem;
}

/* TABLE */
.table-container{
  padding:20px;
}

.table-box{
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
  border:1px solid rgba(0,255,255,0.2);
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 0 25px rgba(0,255,255,0.15);
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:14px;
  text-align:center;
}

th{
  background:rgba(0,255,255,0.15);
  color:cyan;
  font-size:0.75rem;
  letter-spacing:1px;
}

tr{
  border-bottom:1px solid rgba(255,255,255,0.05);
  transition:0.3s;
}

tr:hover{
  background:rgba(0,255,255,0.08);
  transform:scale(1.01);
}

/* TEAM */
.team{
  display:flex;
  align-items:center;
  gap:12px;
  justify-content:flex-start;
}

.team img{
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:12px;
  padding:4px;
  background:rgba(0,0,0,0.6);

  box-shadow:
    0 0 10px cyan,
    0 0 20px rgba(0,255,255,0.3);

  transition:0.3s;
}

.team img:hover{
  transform:scale(1.1);
}

.team span{
  font-size:0.85rem;
  letter-spacing:1px;
}

/* RANK */
.rank-1{
  color:gold;
  text-shadow:0 0 12px gold;
  font-weight:bold;
  font-size:1.1rem;
}

.rank-2{
  color:silver;
  text-shadow:0 0 10px silver;
  font-weight:bold;
}

.rank-3{
  color:#cd7f32;
  text-shadow:0 0 10px #cd7f32;
  font-weight:bold;
}

/* LAST ROW */
tr:last-child{
  opacity:0.7;
}

/* MOBILE */
@media(max-width:600px){

  .team{
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .team img{
    width:70px;
    height:70px;
  }

  th,td{
    font-size:0.65rem;
    padding:8px;
  }
}

/* FOOTER */
footer{
  text-align:center;
  padding:15px;
  font-size:0.7rem;
  color:#777;
  border-top:1px solid rgba(0,255,255,0.2);
  margin-top:20px;
}
</style>
</head>

<body>

<nav>
  <h1>CCE</h1>
  <div class="menu-nav">
    <a href="index.html">Home</a>
    <a href="leaderboard-ml.html">ML</a>
    <a href="leaderboard-ff.html">FF</a>
  </div>
</nav>

      <tbody>

        <tr>

      </tbody>
    </table>

  </div>
</div>

<footer>

</footer>

</body>
</html>
