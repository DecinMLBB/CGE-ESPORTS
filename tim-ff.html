<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tim Free Fire - CCE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Orbitron',sans-serif;
}

body{
  background: radial-gradient(circle at top, #060b1f, #02030a);
  color:white;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:rgba(0,0,0,0.7);
  border-bottom:1px solid rgba(0,140,255,0.2);
}

nav h1{
  color:#00c3ff;
  text-shadow:0 0 10px #00c3ff;
}

nav a{
  color:white;
  text-decoration:none;
  margin-left:10px;
  font-size:0.8rem;
  padding:6px 10px;
  border-radius:6px;
  transition:0.3s;
}

nav a:hover{
  background:#00c3ff;
  color:black;
}

/* TITLE */
.title{
  text-align:center;
  margin:30px 0 10px;
  font-size:1.8rem;
  color:#00c3ff;
  text-shadow:0 0 20px #00c3ff;
}

/* SUBTITLE */
.subtitle{
  text-align:center;
  font-size:0.8rem;
  color:#aaa;
  margin-bottom:30px;
}

/* GRID TIM */
.grid{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:15px;
}

/* CARD TIM */
.card{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(0,140,255,0.2);
  border-radius:12px;
  padding:15px;
  text-align:center;
  transition:0.3s;
  backdrop-filter:blur(8px);
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 25px rgba(0,140,255,0.5);
}

/* LOGO TIM */
.card img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:10px;
  border:2px solid #00c3ff;
  margin-bottom:10px;
}

/* NAMA TIM */
.card h3{
  font-size:0.8rem;
}

/* STATUS */
.status{
  font-size:0.7rem;
  color:#00c3ff;
  margin-top:5px;
}

/* EMPTY CARD */
.empty{
  opacity:0.4;
  border-style:dashed;
}

/* FOOTER */
footer{
  text-align:center;
  padding:15px;
  font-size:0.7rem;
  color:#777;
  border-top:1px solid rgba(0,140,255,0.2);
  margin-top:30px;
}
</style>
</head>

<body>

<nav>
  <h1>CCE</h1>
  <div>
    <a href="index.html">Home</a>
    <a href="leaderboard-ml.html">ML</a>
    <a href="leaderboard-ff.html">FF</a>
  </div>
</nav>

<h2 class="title">TIM FREE FIRE</h2>
<p class="subtitle">Daftar peserta yang sudah bergabung</p>

<div class="grid">

  <div class="card">
    <img src="HARVY.JPG">
    <h3>HARVY</h3>
    <div class="status">Active</div>
  </div>

  <div class="card">
    <img src="insya.png">
    <h3>INSYAALLAH GACORR</h3>
    <div class="status">Active</div>
  </div>

  <div class="card">
    <img src="NONE.png">
    <h3>NONE</h3>
    <div class="status">Pending</div>
  </div>

  <div class="card empty">
    <img src="NONE.png">
    <h3>Slot Kosong</h3>
    <div class="status">Available</div>
  </div>

  <div class="card empty">
    <img src="NONE.png">
    <h3>Slot Kosong</h3>
    <div class="status">Available</div>
  </div>

  <div class="card empty">
    <img src="NONE.png">
    <h3>Slot Kosong</h3>
    <div class="status">Available</div>
  </div>

</div>

<footer>
<p>© 2026 Conggeang Community Esports</p>
</footer>

</body>
</html>
