<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard FF - CCE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}

body{
  background: radial-gradient(circle at top, #0f0f1a, #050509);
  color:white;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:rgba(0,0,0,0.6);
  border-bottom:1px solid rgba(0,255,255,0.2);
}

nav h1{color:cyan;}
nav a{
  color:white;
  text-decoration:none;
  margin-left:10px;
  font-size:0.8rem;
}
nav a:hover{color:cyan;}

/* TITLE */
.title{
  text-align:center;
  margin:25px 0;
  color:cyan;
  text-shadow:0 0 15px cyan;
}

/* SCROLL FIX */
.table-wrapper{
  overflow-x:auto;
  padding-bottom:10px;
}

/* TABLE */
table{
  width:100%;
  min-width:700px;
  border-collapse:collapse;
}

th{
  background:rgba(0,255,255,0.15);
  color:cyan;
  padding:12px;
}

td{
  padding:14px;
  text-align:center;
}

tr{
  border-bottom:1px solid rgba(255,255,255,0.1);
  transition:0.3s;
}

tr:hover{
  background:rgba(0,255,255,0.08);
}

/* TEAM */
.team{
  display:flex;
  align-items:center;
  gap:12px;
}

.team img{
  width:45px;
  height:45px;
  border-radius:8px;
  border:2px solid cyan;
}

/* RANK */
.rank{
  font-weight:bold;
  font-size:1rem;
}

/* TOP STYLE */
.top1{background:rgba(255,215,0,0.1);}
.top1 .rank{color:gold;text-shadow:0 0 10px gold;}

.top2{background:rgba(192,192,192,0.1);}
.top2 .rank{color:silver;text-shadow:0 0 10px silver;}

.top3{background:rgba(205,127,50,0.1);}
.top3 .rank{color:#cd7f32;text-shadow:0 0 10px #cd7f32;}

/* FOOTER */
footer{
  text-align:center;
  padding:15px;
  font-size:0.7rem;
  color:#777;
  border-top:1px solid rgba(0,255,255,0.2);
  margin-top:20px;
}

/* MOBILE */
@media(max-width:600px){
  th, td{
    font-size:0.75rem;
    padding:10px;
  }

  .team img{
    width:38px;
    height:38px;
  }
}
</style>
</head>
