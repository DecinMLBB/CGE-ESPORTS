<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard MLBB - CCE</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Orbitron', sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #0f0f1a, #050509);
      color: white;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: rgba(0,0,0,0.6);
      border-bottom: 1px solid rgba(0,255,255,0.2);
      flex-wrap: wrap;
    }

    nav h1 {
      color: cyan;
      font-size: 1.2rem;
    }

    nav .menu-nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-size: 0.8rem;
      padding: 5px 8px;
      border-radius: 5px;
    }

    nav a:hover {
      background: cyan;
      color: black;
    }

    .title {
      text-align: center;
      margin: 25px 0;
      color: cyan;
      text-shadow: 0 0 15px cyan;
    }

    .table-container {
      padding: 0 15px 30px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
    }

    th, td {
      padding: 12px;
      text-align: center;
    }

    th {
      background: rgba(0,255,255,0.1);
      color: cyan;
    }

    tr {
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    tr:hover {
      background: rgba(0,255,255,0.05);
    }

    .team {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: flex-start;
    }

    .team img {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid cyan;
    }

    .rank-1 {
      color: gold;
      text-shadow: 0 0 10px gold;
      font-weight: bold;
    }

    .rank-2 {
      color: silver;
      text-shadow: 0 0 10px silver;
      font-weight: bold;
    }

    .rank-3 {
      color: #cd7f32;
      text-shadow: 0 0 10px #cd7f32;
      font-weight: bold;
    }

    tr:last-child {
      opacity: 0.7;
    }

    @media(max-width: 600px){
      .team {
        flex-direction: column;
        align-items: center;
      }

      .team img {
        width: 25px;
        height: 25px;
      }

      th, td {
        font-size: 0.7rem;
        padding: 8px;
      }
    }

    footer {
      text-align: center;
      padding: 15px;
      font-size: 0.7rem;
      color: #777;
      border-top: 1px solid rgba(0,255,255,0.2);
    }
  </style>
</head>

<body>

</div>

</html>
